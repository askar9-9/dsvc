services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: smart_home
      POSTGRES_USER: smart_home
      POSTGRES_PASSWORD: smart_home
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_home -d smart_home"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://smart_home:smart_home@postgres:5432/smart_home
      SEED_ENABLED: "true"
      SIM_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
